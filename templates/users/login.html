{% extends 'base.html' %}

{% block title %}Login - Nexus Learn{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 80px auto; padding: 40px;">
    <h2 style="font-size: 2rem; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-align:center; margin-bottom: 30px;">Welcome Back</h2>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column;">
            {{ form.as_p }}
            <button type="submit" class="btn" style="width: 100%; margin-top:20px;">Access Portal &rarr;</button>
        </div>
    </form>
    <div style="text-align:center; margin-top: 30px; font-size:0.95rem; color:var(--text-muted);">
        New to the platform? <a href="{% url 'register' %}" style="color:#60a5fa; font-weight:600;">Apply for an account.</a>
    </div>
</div>
{% endblock %}
