{% extends 'base.html' %}

{% block title %}Register - Learning Platform{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 15px;">
            {{ form.as_p }}
            <button type="submit" class="btn">Register</button>
        </div>
    </form>
    <p style="margin-top: 20px;">Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
</div>
{% endblock %}
