{% extends 'base.html' %}

{% block title %}Edit Course - Learning Platform{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: auto;">
    <a href="{% url 'instructor_dashboard' %}">&larr; Back to Dashboard</a>
    <h2 style="margin-top:20px;">Edit Course</h2>
    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        <div>
            <label>Title</label><br>
            <input type="text" name="title" value="{{ course.title }}" required style="width:100%; padding:8px;">
        </div>
        <div>
            <label>Category</label><br>
            <input type="text" name="category" value="{{ course.category }}" required style="width:100%; padding:8px;">
        </div>
        <div>
            <label>Price ($)</label><br>
            <input type="number" step="0.01" name="price" value="{{ course.price }}" required style="width:100%; padding:8px;">
        </div>
        <div>
            <label>Description</label><br>
            <textarea name="description" rows="5" required style="width:100%; padding:8px;">{{ course.description }}</textarea>
        </div>
        <button type="submit" class="btn">Update Course</button>
    </form>
</div>
{% endblock %}
