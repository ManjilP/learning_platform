{% extends 'base.html' %}

{% block title %}{{ lesson.title }} - {{ course.title }}{% endblock %}

{% block content %}
<div class="card">
    <a href="{% url 'course_detail' course.id %}">&larr; Back to Course</a>
    <h1 style="margin-top:20px;">{{ lesson.title }}</h1>
    
    <div style="background: #000; padding:10px; border-radius:8px; display:inline-block; margin-top:20px;">
        <video width="800" controls style="max-width:100%;">
            <source src="{{ lesson.video_file.url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div style="margin-top: 30px; display: flex; justify-content: space-between;">
        <div>
            {% if prev_lesson %}
                <a href="{% url 'lesson_detail' course.id prev_lesson.id %}" class="btn">Previous Lesson</a>
            {% endif %}
        </div>
        <div>
            {% if next_lesson %}
                <a href="{% url 'lesson_detail' course.id next_lesson.id %}" class="btn">Next Lesson</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
