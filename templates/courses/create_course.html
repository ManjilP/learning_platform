{% extends 'base.html' %}

{% block title %}Create Course - Learning Platform{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: auto;">
    <h2>Create a New Course</h2>
    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        <div>
            <label>Title</label><br>
            <input type="text" name="title" required style="width:100%; padding:8px;" placeholder="Course Title">
        </div>
        <div>
            <label>Category</label><br>
            <input type="text" name="category" required style="width:100%; padding:8px;" placeholder="E.g. Development, Design, Business">
        </div>
        <div>
            <label>Price ($)</label><br>
            <input type="number" step="0.01" name="price" value="0.00" required style="width:100%; padding:8px;">
        </div>
        <div>
            <label>Description</label><br>
            <textarea name="description" rows="5" required style="width:100%; padding:8px;" placeholder="What will students learn in this course?"></textarea>
        </div>
        <button type="submit" class="btn">Create Course</button>
    </form>
</div>
{% endblock %}
