{% extends 'base.html' %}

{% block title %}Upload Lesson - Learning Platform{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: auto;">
    <a href="{% url 'instructor_dashboard' %}">&larr; Back to Dashboard</a>
    <h2 style="margin-top:20px;">Upload Lesson to {{ course.title }}</h2>
    <form method="post" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        <div>
            <label>Title</label><br>
            <input type="text" name="title" required style="width:100%; padding:8px;" placeholder="Lesson Title">
        </div>
        <div>
            <label>Video File (MP4)</label><br>
            <input type="file" name="video_file" required accept="video/mp4,video/x-m4v,video/*" style="width:100%; padding:8px;">
        </div>
        <button type="submit" class="btn">Upload Lesson</button>
    </form>
</div>
{% endblock %}
